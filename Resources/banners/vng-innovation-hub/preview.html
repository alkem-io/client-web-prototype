<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VNG Innovation Hub - Banner Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111; font-family: 'Inter', system-ui, sans-serif; padding: 2rem; }
    h1 { color: white; text-align: center; margin-bottom: 2rem; font-size: 1.5rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(416px, 1fr)); gap: 1.5rem; max-width: 1400px; margin: 0 auto; }
    .banner-card { border-radius: 12px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.3); width: 416px; height: 256px; }
    .banner-card img { width: 416px; height: 256px; display: block; }
    .banner-label { color: #999; font-size: 0.75rem; padding: 0.5rem 0; }
  </style>
</head>
<body>
  <h1>VNG Innovation Hub — Space Banners Preview</h1>
